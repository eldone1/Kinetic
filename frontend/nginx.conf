# =========================================
# NGINX CONFIG - KINETIC REHAB FRONTEND
# =========================================
# Este archivo:
# - Sirve Angular compilado
# - Redirecciona rutas SPA a index.html
# - Hace proxy hacia Spring Boot
# - Mejora performance con gzip y cache
# =========================================

server {

    # Puerto interno del contenedor nginx
    listen 80;

    # Nombre del servidor
    server_name localhost;

    # Carpeta donde Angular build genera archivos
    root /usr/share/nginx/html;

    # Archivo principal
    index index.html;

    # =========================================
    # GZIP
    # =========================================
    # Comprime archivos enviados al navegador
    # Reduce tamaño de JS/CSS/JSON
    # Mejora velocidad de carga
    # =========================================
    gzip on;

    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml;

    gzip_min_length 1024;

    # =========================================
    # CACHE DE ARCHIVOS ESTÁTICOS
    # =========================================
    # Angular genera archivos con hash:
    # main.ABC123.js
    #
    # Se pueden cachear agresivamente
    # porque cambian automáticamente en cada build
    # =========================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {

        expires 1y;

        add_header Cache-Control "public, immutable";

        try_files $uri =404;
    }

    # =========================================
    # PROXY AL BACKEND SPRING BOOT
    # =========================================
    # Todas las peticiones /api/*
    # se envían al contenedor backend
    #
    # Ejemplo:
    # /api/pacientes
    # -> http://backend:8080/api/pacientes
    #
    # Esto evita problemas CORS
    # =========================================
    location /api/ {

        proxy_pass http://backend:8080/api/;

        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts útiles para requests lentos
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # =========================================
    # ANGULAR SPA ROUTING
    # =========================================
    # Angular maneja rutas internamente:
    #
    # /dashboard
    # /pacientes
    # /login
    #
    # Si nginx no encuentra el archivo,
    # devuelve index.html
    # =========================================
    location / {

        try_files $uri $uri/ /index.html;
    }

    # =========================================
    # SEGURIDAD
    # =========================================
    # Oculta versión de nginx
    # =========================================
    server_tokens off;
}
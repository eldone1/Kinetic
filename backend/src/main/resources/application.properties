spring.application.name=kinetic-rehab-backend

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/kinetic_db?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
spring.datasource.username=dev_user
spring.datasource.password=dev_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
jwt.secret=${JWT_SECRET:KineticRehab2025SecretKeyParaFirmarJWTMuylargaSegura}
jwt.expiration=${JWT_EXPIRATION:28800000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Server
server.port=8080

# Logging
logging.level.com.kineticrehab=DEBUG
